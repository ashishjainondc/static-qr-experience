<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1c75bc" />
    <meta
      name="description"
      content="Discover ONDC buyer apps for top experiences and attractions in Kolkata."
    />
    <meta
      property="og:title"
      content="Discover Experiences — Kolkata | ONDC"
    />
    <meta
      property="og:description"
      content="Discover ONDC buyer apps for top experiences and attractions in Kolkata."
    />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="/static-qr-experience/public/assets/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="/static-qr-experience/public/picker.css" />
    <title>Discover Experiences — Kolkata | ONDC</title>

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-X9LS4KMKBC"
    ></script>
    <script src="/static-qr-experience/public/app.js" defer></script>
  </head>

  <body data-city="kolkata">
    <div class="app-root">
      <div id="navbar-slot"></div>

      <!-- Hero header -->
      <header class="header">
        <div class="header-hero">
          <div class="header-logo" id="header-logo"></div>
          <div class="header-text">
            <h1 class="header-title" id="page-title">Kolkata Experiences</h1>
            <p class="header-subtitle">
              Choose an attraction to see authorised ONDC buyer apps
            </p>
          </div>
        </div>
      </header>

      <!-- Dynamic content, rendered from data/entities.json by public/app.js -->
      <main class="app-content" id="main-content">
        <div class="status-wrap">
          <p class="status-body">Loading experiences…</p>
        </div>
      </main>

      <div id="footer-slot"></div>
    </div>
  </body>
</html>
