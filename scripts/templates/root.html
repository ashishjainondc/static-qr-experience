<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1c75bc" />
    <meta
      name="description"
      content="Discover {{ORG_NAME}} buyer apps for top experiences and attractions near you."
    />
    <meta property="og:title" content="{{PRODUCT_NAME}} | {{ORG_NAME}}" />
    <meta
      property="og:description"
      content="Discover {{ORG_NAME}} buyer apps for top experiences and attractions near you."
    />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="{{BASE_PATH}}/public/images/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="{{BASE_PATH}}/public/css/picker.css" />
    <title>{{PRODUCT_NAME}} | {{ORG_NAME}}</title>

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id={{GA_ID}}"
    ></script>
    <script src="{{BASE_PATH}}/public/js/app.js" defer></script>
  </head>

  <body>
    <div class="app-root">
      <div id="navbar-slot"></div>

      <!-- Hero header -->
      <header class="header">
        <div class="header-hero">
          <div class="header-logo" id="header-logo"></div>
          <div class="header-text">
            <h1 class="header-title" id="page-title">Select Your City</h1>
            <p class="header-subtitle">
              Choose a city to discover experiences and attractions near you
            </p>
          </div>
        </div>
      </header>

      <!-- Dynamic content, rendered from data/entities.json by public/js/app.js -->
      <main class="app-content" id="main-content">
        <div class="status-wrap">
          <p class="status-body">Loading cities…</p>
        </div>
      </main>

      <div id="footer-slot"></div>
    </div>
  </body>
</html>
