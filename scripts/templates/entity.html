<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="{{THEME_COLOR}}" />
    <title>{{ENTITY_PAGE_TITLE}}</title>
    <meta name="description" content="{{ENTITY_DESCRIPTION}}" />
    <meta property="og:title" content="{{OG_TITLE}}" />
    <meta property="og:description" content="{{OG_DESCRIPTION}}" />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/css/entity.css" />

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id={{GA_ID}}"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "{{GA_ID}}");
    </script>
    <script src="/assets/js/app.js" defer></script>
  </head>

  <body data-city="{{CITY_SLUG}}" data-entity="{{ENTITY_SLUG}}">
    <div class="app-root">
      <div id="navbar-slot"></div>

      <header class="header">
        <div class="header-hero">
          <div class="header-logo" id="header-logo"></div>
          <div class="header-text">
            <h1 class="header-title" id="page-title">{{ENTITY_TITLE}}</h1>
            <p class="header-subtitle">{{ENTITY_SUBTITLE}}</p>
          </div>
        </div>
      </header>

      <main class="app-content" id="main-content">
        <div class="status-wrap">
          <p class="status-body">{{LOADING_TEXT}}</p>
        </div>
      </main>

      <div id="footer-slot"></div>
    </div>
  </body>
</html>
